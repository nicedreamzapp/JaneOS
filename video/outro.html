<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Bubblegum+Sans&display=swap');
  html, body { margin: 0; padding: 0; width: 1280px; height: 720px; overflow: hidden; background: #0e0726; font-family: 'Fredoka', system-ui, sans-serif; }
  body {
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 50% 50%, rgba(184,108,255,0.25), transparent 50%),
      conic-gradient(from 60deg at 50% 50%,
        #6e7bff 0deg, #5fc7ff 60deg, #6affd4 120deg,
        #ffe066 180deg, #ff77d7 240deg, #b86cff 300deg, #6e7bff 360deg);
    background-blend-mode: screen, normal;
  }
  body::before { content:""; position:fixed; inset:0; backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
    background: rgba(14,7,38,0.55); }
  .stage { position: relative; z-index: 2; text-align: center;
    animation: fade-in 0.6s ease-out; }
  .badge {
    width: 180px; height: 180px;
    border-radius: 44px;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.55), transparent 50%),
      conic-gradient(from 210deg at 50% 50%,
        #ff77d7 0deg, #b86cff 60deg, #6e7bff 120deg,
        #5fc7ff 180deg, #6affd4 240deg, #ffe066 300deg, #ff77d7 360deg);
    margin: 0 auto 28px;
    box-shadow:
      0 24px 60px rgba(255,120,230,0.45),
      inset 0 -20px 40px rgba(0,0,0,0.18),
      inset 0 20px 40px rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .unicorn { font-size: 120px; filter: drop-shadow(0 8px 14px rgba(0,0,0,0.4)); }
  h1 { font-family: 'Bubblegum Sans', cursive; font-size: 64px; margin: 0 0 8px;
    background: linear-gradient(180deg, #fff 0%, #ffd1ee 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
  .tag { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.92);
    letter-spacing: 2px; text-shadow: 0 4px 14px rgba(0,0,0,0.5); margin: 12px 0 28px; }
  .creds { font-size: 18px; color: rgba(255,255,255,0.85); letter-spacing: 1.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5); line-height: 1.5; max-width: 720px; margin: 0 auto; }
  .creds .row { display: flex; justify-content: center; gap: 12px; opacity: 0.85; }
  .heart { font-size: 28px; vertical-align: middle; }
  @keyframes fade-in { from {opacity: 0; transform: translateY(8px)} to {opacity: 1; transform: translateY(0)} }
</style></head><body>
<div class="stage">
  <div class="badge"><div class="unicorn">🦄</div></div>
  <h1>where learning feels like play</h1>
  <div class="tag">★ JANE'S LEARNING WORLD ★</div>
  <div class="creds">
    <div class="row">Built with <span class="heart">💖</span> by Daddy</div>
    <div class="row">Powered by Claude · Voiced by LibriTTS R</div>
  </div>
</div>
</body></html>
