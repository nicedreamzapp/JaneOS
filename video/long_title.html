<!doctype html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700;800&family=Bubblegum+Sans&display=swap');
html, body { margin:0; padding:0; width:1920px; height:1080px; overflow:hidden;
  font-family: 'Fredoka', system-ui, sans-serif; background: #0e0726; }
body {
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(circle at 25% 25%, rgba(255,255,255,0.18), transparent 35%),
    radial-gradient(circle at 75% 75%, rgba(255,200,255,0.18), transparent 40%),
    conic-gradient(from 210deg at 50% 50%,
      #ff77d7 0deg, #b86cff 60deg, #6e7bff 120deg,
      #5fc7ff 180deg, #6affd4 240deg, #ffe066 300deg, #ff77d7 360deg);
}
body::before { content:""; position:fixed; inset:0; backdrop-filter: blur(80px); -webkit-backdrop-filter: blur(80px);
  background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(14,7,38,0.45) 70%); }
.wrap { position: relative; z-index: 2; text-align: center; max-width: 1500px; padding: 60px; }
.unicorn { font-size: 240px; line-height: 1; margin-bottom: 24px;
  filter: drop-shadow(0 0 40px rgba(255,255,255,0.7)) drop-shadow(0 30px 40px rgba(0,0,0,0.4));
}
h1 {
  font-family: 'Bubblegum Sans', cursive; font-size: 156px; margin: 0 0 14px;
  background: linear-gradient(180deg, #fff 0%, #ffd1ee 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
  letter-spacing: 2px;
}
.sub { font-size: 50px; color: #fff; opacity: 0.95; font-weight: 700; letter-spacing: 6px;
  margin-bottom: 56px; text-shadow: 0 6px 18px rgba(0,0,0,0.6); }
.skills {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 32px;
  font-size: 38px; color: #fff; font-weight: 600;
  background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.25);
  border-radius: 32px; padding: 36px 56px; backdrop-filter: blur(10px);
}
.skills div { text-align: left; text-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 14px; }
.skills .em { font-size: 42px; line-height: 1; }
</style></head><body>
<div class="wrap">
  <div class="unicorn">🦄</div>
  <h1>Learning Fun: 1st Grade</h1>
  <div class="sub">★ FREE ADAPTIVE TUTOR FOR YOUR KID ★</div>
  <div class="skills">
    <div><span class="em">📖</span> Reading</div>
    <div><span class="em">🔤</span> Phonics</div>
    <div><span class="em">👁️</span> Sight Words</div>
    <div><span class="em">➕</span> Addition</div>
    <div><span class="em">➖</span> Subtraction</div>
    <div><span class="em">🔢</span> Place Value</div>
    <div><span class="em">📚</span> Reading Sentences</div>
    <div><span class="em">🌿</span> Science</div>
    <div><span class="em">🌎</span> Social Studies</div>
    <div><span class="em">💖</span> Feelings</div>
    <div><span class="em">✏️</span> Letter Tracing</div>
    <div><span class="em">🎉</span> + so much more</div>
  </div>
</div>
</body></html>
