<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;800&family=Bubblegum+Sans&display=swap');
  html, body { margin: 0; padding: 0; width: 1280px; height: 720px; overflow: hidden; background: #0e0726; font-family: 'Fredoka', system-ui, sans-serif; }
  body {
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), transparent 35%),
      radial-gradient(circle at 70% 75%, rgba(255,200,255,0.18), transparent 40%),
      conic-gradient(from 210deg at 50% 50%,
        #ff77d7 0deg, #b86cff 60deg, #6e7bff 120deg,
        #5fc7ff 180deg, #6affd4 240deg, #ffe066 300deg, #ff77d7 360deg);
    background-blend-mode: screen, screen, normal;
  }
  body::before { content:""; position:fixed; inset:0; backdrop-filter: blur(80px); -webkit-backdrop-filter: blur(80px);
    background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(14,7,38,0.55) 70%); }
  .stage { position: relative; z-index: 2; text-align: center;
    animation: fade-in 0.6s ease-out, scale-in 0.8s cubic-bezier(.34,1.56,.64,1); }
  .badge {
    width: 240px; height: 240px;
    border-radius: 60px;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.55), transparent 50%),
      conic-gradient(from 210deg at 50% 50%,
        #ff77d7 0deg, #b86cff 60deg, #6e7bff 120deg,
        #5fc7ff 180deg, #6affd4 240deg, #ffe066 300deg, #ff77d7 360deg);
    margin: 0 auto 30px;
    position: relative;
    box-shadow:
      0 30px 80px rgba(255,120,230,0.45),
      0 0 0 4px rgba(255,255,255,0.15),
      inset 0 -30px 60px rgba(0,0,0,0.18),
      inset 0 30px 60px rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform: translateY(0) rotate(0)} 50%{transform: translateY(-8px) rotate(2deg)} }
  .badge::before { content:""; position:absolute; inset:30px; border-radius:38px;
    border: 2px solid rgba(255,255,255,0.35); }
  .unicorn { font-size: 160px; line-height: 1;
    filter: drop-shadow(0 0 28px rgba(255,255,255,0.7)) drop-shadow(0 14px 18px rgba(0,0,0,0.4));
    animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform: scale(1)} 50%{transform: scale(1.06)} }
  h1 {
    font-family: 'Bubblegum Sans', cursive;
    font-size: 88px; margin: 0 0 12px;
    background: linear-gradient(180deg, #fff 0%, #ffd1ee 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
    letter-spacing: 1px;
  }
  .sub {
    font-size: 26px; font-weight: 600; color: rgba(255,255,255,0.85);
    letter-spacing: 4px; text-transform: uppercase;
    text-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .sparkle { position: absolute; pointer-events: none; }
  .s1 { top: 80px; left: 200px; font-size: 80px;  opacity: .9;  animation: twinkle 1.6s ease-in-out infinite; }
  .s2 { top: 580px; right: 220px; font-size: 64px; opacity: .85; animation: twinkle 2.0s ease-in-out infinite .3s; }
  .s3 { top: 180px; right: 120px; font-size: 52px; opacity: .9;  animation: twinkle 1.4s ease-in-out infinite .6s; }
  .s4 { top: 480px; left: 130px;  font-size: 40px; opacity: .8;  animation: twinkle 1.8s ease-in-out infinite .9s; }
  @keyframes twinkle { 0%,100%{opacity:.4; transform: scale(0.85)} 50%{opacity:1; transform: scale(1.15)} }
  @keyframes fade-in { from {opacity: 0} to {opacity: 1} }
  @keyframes scale-in { from {transform: scale(0.85)} to {transform: scale(1)} }
</style></head><body>
<div class="sparkle s1">⭐</div>
<div class="sparkle s2">✨</div>
<div class="sparkle s3">💖</div>
<div class="sparkle s4">🌈</div>
<div class="stage">
  <div class="badge"><div class="unicorn">🦄</div></div>
  <h1>Jane's Learning World</h1>
  <div class="sub">a learning tutor for the smartest little kid</div>
</div>
</body></html>
