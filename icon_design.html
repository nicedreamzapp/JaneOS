<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body { margin: 0; padding: 0; background: transparent; }
  .icon {
    width: 1024px; height: 1024px;
    border-radius: 240px;
    position: relative;
    overflow: hidden;
    isolation: isolate;
    /* iridescent / holographic conic gradient base */
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.55) 0%, transparent 35%),
      radial-gradient(circle at 70% 80%, rgba(255,255,255,0.0) 0%, rgba(0,0,0,0.18) 65%),
      conic-gradient(from 210deg at 50% 50%,
        #ff77d7 0deg,
        #b86cff 50deg,
        #6e7bff 100deg,
        #5fc7ff 150deg,
        #6affd4 200deg,
        #ffe066 240deg,
        #ff8fa3 290deg,
        #ff77d7 360deg);
    box-shadow:
      inset 0 -60px 100px rgba(20, 0, 40, 0.30),
      inset 0 40px 80px rgba(255, 255, 255, 0.42);
  }
  /* deep glow halo behind unicorn */
  .halo {
    position: absolute;
    width: 640px; height: 640px;
    top: 50%; left: 50%;
    transform: translate(-50%, -56%);
    background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, rgba(255,225,255,0.55) 25%, rgba(184,108,255,0.0) 65%);
    filter: blur(20px);
  }
  /* glass ring */
  .glass-ring {
    position: absolute;
    inset: 50px;
    border-radius: 200px;
    background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.04));
    border: 2px solid rgba(255,255,255,0.55);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.6),
      inset 0 -2px 0 rgba(0,0,0,0.15);
  }
  /* highlight strip top */
  .highlight {
    position: absolute;
    top: 30px; left: 80px; right: 80px; height: 220px;
    border-radius: 200px 200px 60% 60% / 200px 200px 30% 30%;
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 70%);
    filter: blur(2px);
  }
  .unicorn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -54%);
    font-size: 660px;
    line-height: 1;
    filter:
      drop-shadow(0 0 40px rgba(255, 240, 255, 0.9))
      drop-shadow(0 30px 35px rgba(0, 0, 30, 0.45))
      drop-shadow(0 0 12px rgba(255, 100, 200, 0.45));
  }
  .rainbow {
    position: absolute;
    top: 70px; left: 100px;
    font-size: 200px;
    line-height: 1;
    transform: rotate(-18deg);
    filter:
      drop-shadow(0 0 25px rgba(255, 120, 230, 0.7))
      drop-shadow(0 10px 16px rgba(0,0,0,0.25));
  }
  .star1 { position: absolute; top: 110px; right: 140px; font-size: 150px; line-height: 1;
    filter: drop-shadow(0 0 35px gold) drop-shadow(0 0 80px rgba(255,210,0,0.6)); }
  .star2 { position: absolute; bottom: 290px; right: 130px; font-size: 110px; line-height: 1;
    filter: drop-shadow(0 0 25px white) drop-shadow(0 0 60px rgba(180,130,255,0.55)); }
  .heart  { position: absolute; bottom: 320px; left: 140px; font-size: 130px; line-height: 1;
    filter: drop-shadow(0 0 25px rgba(255,80,140,0.7)) drop-shadow(0 8px 14px rgba(0,0,0,0.25)); }

  /* glowing dust dots */
  .dot { position: absolute; background: white; border-radius: 50%;
    box-shadow: 0 0 18px white, 0 0 45px rgba(255,255,255,0.5); }
  .d1 { width: 22px; height: 22px; top: 240px; left: 320px; }
  .d2 { width: 14px; height: 14px; top: 380px; right: 250px; }
  .d3 { width: 18px; height: 18px; bottom: 490px; right: 350px; }
  .d4 { width: 24px; height: 24px; bottom: 410px; left: 280px; opacity: 0.95; }
  .d5 { width: 12px; height: 12px; top: 520px; right: 180px; }
  .d6 { width: 16px; height: 16px; top: 700px; left: 220px; }

  /* nameplate */
  .nameplate {
    position: absolute;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    font-family: "Bubblegum Sans", "Marker Felt", system-ui, sans-serif;
    font-weight: 900;
    font-size: 140px;
    letter-spacing: 6px;
    padding: 6px 70px;
    border-radius: 100px;
    /* glassy pill with rainbow inner glow */
    background:
      linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,235,255,0.92));
    color: transparent;
    background-clip: text;
    -webkit-background-clip: text;
    /* gradient text */
    background-image:
      linear-gradient(180deg, rgba(255,255,255,0.0), rgba(255,255,255,0.0)),
      linear-gradient(180deg, #c01a8a 0%, #6b2cd6 100%);
    -webkit-text-fill-color: transparent;
    text-shadow:
      0 4px 0 rgba(255,255,255,0.6),
      0 14px 24px rgba(0,0,0,0.35);
  }
  .nameplate-bg {
    position: absolute;
    bottom: 70px; left: 50%;
    transform: translateX(-50%);
    width: 480px; height: 170px;
    border-radius: 100px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.97) 0%, rgba(255,225,255,0.92) 100%);
    box-shadow:
      0 20px 40px rgba(0,0,0,0.30),
      0 8px 0 rgba(192, 26, 138, 0.35),
      inset 0 2px 0 rgba(255,255,255,0.9),
      inset 0 -3px 0 rgba(192, 26, 138, 0.25);
    z-index: 1;
  }
  .nameplate { z-index: 2; }
</style></head><body>
<div class="icon">
  <div class="halo"></div>
  <div class="glass-ring"></div>
  <div class="highlight"></div>
  <div class="rainbow">🌈</div>
  <div class="star1">⭐</div>
  <div class="star2">✨</div>
  <div class="heart">💖</div>
  <div class="dot d1"></div>
  <div class="dot d2"></div>
  <div class="dot d3"></div>
  <div class="dot d4"></div>
  <div class="dot d5"></div>
  <div class="dot d6"></div>
  <div class="unicorn">🦄</div>
  <div class="nameplate-bg"></div>
  <div class="nameplate">JANE</div>
</div>
</body></html>
